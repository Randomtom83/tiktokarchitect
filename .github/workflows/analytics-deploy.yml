name: Analytics Deploy — Merge, Deploy, Email

on:
  push:
    branches: [master]
    paths:
      - 'data/analytics-*.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Don't run on commits from this workflow's own enrichment step
    if: "!contains(github.event.head_commit.message, 'analytics: enriched')"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Merge analytics with blog trends
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/analytics_merge.py

      - name: Commit enriched analytics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/analytics-*.json
          git add data/.last-digest-date 2>/dev/null || true
          git diff --cached --quiet && echo "No changes" || {
            git commit -m "analytics: enriched with verdicts and recommendations $(date +%Y-%m-%d)"
            git pull --rebase origin master
            git push
          }

      - name: Deploy to IONOS via SFTP
        run: |
          sudo apt-get install -y sshpass > /dev/null 2>&1
          sshpass -p "${{ secrets.SFTP_PASSWORD }}" sftp -o StrictHostKeyChecking=no -P ${{ secrets.SFTP_PORT }} ${{ secrets.SFTP_USER }}@${{ secrets.SFTP_HOST }} <<'SFTP_COMMANDS'
          cd /website/data
          put data/analytics-tiktokarchitect.json
          put data/analytics-randomtom83.json
          put data/blog-trends-*.json
          bye
          SFTP_COMMANDS
          echo "SFTP deploy complete"

      - name: Send morning digest email
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_RECIPIENT: ${{ secrets.GMAIL_RECIPIENT }}
        run: python scripts/send_digest.py
