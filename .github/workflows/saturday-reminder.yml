name: Saturday YouTube Re-Auth Reminder

on:
  schedule:
    # Saturdays at 12:45 UTC = 8:45 AM EDT / 7:45 AM EST
    # (Tom's existing calendar reminder fires at 8:45 local; this email backs it up.)
    - cron: '45 12 * * 6'
  workflow_dispatch:  # allow manual trigger for testing

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Send Saturday re-auth reminder
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_RECIPIENT: ${{ secrets.GMAIL_RECIPIENT }}
        run: python scripts/saturday_reminder.py

      - name: Notify on failure
        if: failure()
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_RECIPIENT: ${{ secrets.GMAIL_RECIPIENT }}
          WORKFLOW_NAME: ${{ github.workflow }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPO: ${{ github.repository }}
          REF: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          EVENT: ${{ github.event_name }}
        run: python scripts/notify_failure.py
